<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aviator Admin - Muhammad Shop</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <style>
        body { font-family: sans-serif; background: #0a0b10; color: white; margin: 0; padding: 15px; }
        .head-bar { background: #16171d; padding: 15px; border-radius: 12px; margin-bottom: 20px; border-bottom: 3px solid #28a745; display: flex; justify-content: space-between; align-items: center; }
        .card { background: #111; border-radius: 12px; padding: 15px; margin-bottom: 20px; border: 1px solid #333; overflow-x: auto; }
        h2 { color: #f2a900; font-size: 16px; margin-top: 0; text-transform: uppercase; }
        table { width: 100%; border-collapse: collapse; min-width: 500px; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #222; font-size: 13px; }
        th { background: #1a1a1a; color: #888; }
        .btn { padding: 10px 14px; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; font-size: 11px; }
        .btn-ok { background: #28a745; color: white; margin-bottom: 5px; }
        .btn-rej { background: #ea0606; color: white; }
        .btn-upd { background: #34b4ff; color: white; }
        input { background: #000; border: 1px solid #444; color: white; padding: 8px; border-radius: 5px; width: 80px; }
        .badge { background: #28a745; color: white; padding: 2px 8px; border-radius: 10px; font-size: 12px; }
    </style>
</head>
<body>

<div class="head-bar">
    <div>
        <h1 style="margin:0; font-size:18px;">MASTER ADMIN</h1>
        <small style="color:#888;">Aviator Project Control</small>
    </div>
    <div>Users: <span class="badge" id="uCount">0</span></div>
</div>

<div class="card">
    <h2>Deposit Requests (Check TID)</h2>
    <table id="depTable">
        <thead>
            <tr>
                <th>User (ID)</th>
                <th>Amount</th>
                <th>TID (JazzCash)</th>
                <th>Actions</th>
            </tr>
        </thead>
        <tbody id="depList"></tbody>
    </table>
</div>

<div class="card">
    <h2>Withdrawal Requests</h2>
    <table id="witTable">
        <thead>
            <tr>
                <th>User (ID)</th>
                <th>Amount</th>
                <th>Account</th>
                <th>Actions</th>
            </tr>
        </thead>
        <tbody id="witList"></tbody>
    </table>
</div>

<div class="card">
    <h2>User Management</h2>
    <table>
        <thead>
            <tr>
                <th>Email / ID</th>
                <th>Balance</th>
                <th>Set New</th>
                <th>Action</th>
            </tr>
        </thead>
        <tbody id="userList"></tbody>
    </table>
</div>

<script>
// Firebase Config
const conf = { 
    apiKey: "AIzaSyBXZaME3Z0rd_jsa5LpVG5ZbLpvf6cbu8M", 
    databaseURL: "https://aviator-781d9-default-rtdb.firebaseio.com" 
};
firebase.initializeApp(conf);
const db = firebase.database();

function loadAll() {
    // Deposits & Withdrawals Sync
    db.ref('requests').on('value', s => {
        let dHtml = '', wHtml = '';
        s.forEach(c => {
            const r = c.val();
            if(r.status === 'pending') {
                if(r.type === 'deposit') {
                    // Yahan r.tid check kiya agar na ho to 'N/A' dikhaye
                    dHtml += `<tr>
                        <td>${r.uid ? r.uid.substr(0,8) : 'Unknown'}</td>
                        <td>Rs ${r.amount}</td>
                        <td style="color:#f2a900; font-weight:bold;">${r.tid || 'No TID'}</td>
                        <td>
                            <button class="btn btn-ok" onclick="apprDep('${c.key}','${r.uid}',${r.amount})">APPROVE</button>
                            <button class="btn btn-rej" onclick="rej('${c.key}')">REJECT</button>
                        </td>
                    </tr>`;
                } else {
                    wHtml += `<tr>
                        <td>${r.uid ? r.uid.substr(0,8) : 'Unknown'}</td>
                        <td>Rs ${r.amount}</td>
                        <td>${r.number || 'No Num'}</td>
                        <td>
                            <button class="btn btn-ok" onclick="apprWit('${c.key}')">PAID</button>
                            <button class="btn btn-rej" onclick="rej('${c.key}')">REJECT</button>
                        </td>
                    </tr>`;
                }
            }
        });
        document.getElementById('depList').innerHTML = dHtml || '<tr><td colspan="4">No pending deposits</td></tr>';
        document.getElementById('witList').innerHTML = wHtml || '<tr><td colspan="4">No pending withdrawals</td></tr>';
    });

    // Users List Sync
    db.ref('users').on('value', s => {
        let uHtml = '';
        let count = 0;
        s.forEach(c => {
            const u = c.val();
            count++;
            // Email dikhane ki koshish, warna ID
            const name = u.email || "ID: " + c.key.substr(0,8);
            uHtml += `<tr>
                <td style="font-size:11px;">${name}</td>
                <td style="color:#28a745; font-weight:bold;">Rs ${u.balance ? u.balance.toFixed(2) : '0.00'}</td>
                <td><input type="number" id="inp_${c.key}" placeholder="0"></td>
                <td><button class="btn btn-upd" onclick="upd('${c.key}')">SET</button></td>
            </tr>`;
        });
        document.getElementById('userList').innerHTML = uHtml;
        document.getElementById('uCount').innerText = count;
    });
}

// Actions
function apprDep(id, uid, amt) {
    db.ref('users/'+uid+'/balance').transaction(b => (b || 0) + parseFloat(amt));
    db.ref('requests/'+id).update({status: 'approved'});
    alert("Deposit Added!");
}

function apprWit(id) { 
    db.ref('requests/'+id).update({status: 'completed'}); 
    alert("Marked as Paid!");
}

function rej(id) { 
    if(confirm("Reject this request?")) db.ref('requests/'+id).remove(); 
}

function upd(uid) {
    const v = document.getElementById('inp_'+uid).value;
    if(v !== "") {
        db.ref('users/'+uid).update({balance: parseFloat(v)});
        alert("Balance Updated!");
    }
}

loadAll();
</script>
</body>
</html>
