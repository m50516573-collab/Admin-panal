<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Master Admin - Full VIP Security</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <style>
        :root { --red: #ea0606; --bg: #0f1015; --card: #1b1c21; --win: #28a745; --gold: #f2a900; --blue: #34b4ff; }
        body { background: var(--bg); color: #fff; font-family: sans-serif; margin: 0; padding: 10px; }
        .section { background: var(--card); padding: 15px; border-radius: 12px; margin-bottom: 20px; border: 1px solid #333; }
        h2 { color: var(--gold); font-size: 16px; text-transform: uppercase; margin-bottom: 15px; border-left: 4px solid var(--gold); padding-left: 10px; }
        table { width: 100%; border-collapse: collapse; font-size: 12px; }
        th { text-align: left; color: #888; padding: 10px; border-bottom: 1px solid #333; }
        td { padding: 10px; border-bottom: 1px solid #222; }
        .btn { padding: 6px 10px; border: none; border-radius: 4px; color: white; cursor: pointer; font-weight: bold; font-size: 10px; margin: 2px; }
        .btn-app { background: var(--win); }
        .btn-rej { background: var(--red); }
        .btn-edit { background: var(--blue); }
        input { background: #000; border: 1px solid #444; color: #fff; padding: 5px; border-radius: 4px; width: 60px; }
        .badge { padding: 2px 5px; border-radius: 4px; font-size: 9px; }
    </style>
</head>
<body>

<div id="admin-dashboard">
    <div class="header">
        <h1>MASTER ADMIN <small style="font-size:10px; color:var(--win)">● Database Connected</small></h1>
    </div>

    <div class="section">
        <h2>Auto-Verify (Latest SMS)</h2>
        <div id="last-sms" style="font-size:11px; color:var(--win); background:#000; padding:10px; border-radius:5px;">Waiting for SMS...</div>
    </div>

    <div class="section">
        <h2>Deposit Requests (Anti-Fraud)</h2>
        <table>
            <thead><tr><th>Gmail</th><th>Amount</th><th>TID</th><th>Status</th><th>Actions</th></tr></thead>
            <tbody id="depList"></tbody>
        </table>
    </div>

    <div class="section">
        <h2>Withdrawal Requests</h2>
        <table>
            <thead><tr><th>Gmail</th><th>Amount</th><th>Method/No</th><th>Actions</th></tr></thead>
            <tbody id="withList"></tbody>
        </table>
    </div>

    <div class="section">
        <h2>User Management (Live Balance)</h2>
        <table>
            <thead><tr><th>Email</th><th>Balance</th><th>Actions</th></tr></thead>
            <tbody id="userList"></tbody>
        </table>
    </div>
</div>

<script>
const conf = { 
    apiKey: "AIzaSyBXZaME3Z0rd_jsa5LpVG5ZbLpvf6cbu8M", 
    databaseURL: "https://aviator-781d9-default-rtdb.firebaseio.com" 
};
firebase.initializeApp(conf);
const db = firebase.database();

// 1. Fetch Verified TIDs & SMS
db.ref('verified_tids').on('value', snap => {
    const data = snap.val();
    if(data) {
        const last = Object.values(data).pop();
        document.getElementById('last-sms').innerText = "Last Received: " + last.tid;
    }
    loadData();
});

function loadData() {
    // 2. Deposit Logic with Security
    db.ref('requests').on('value', snap => {
        let depHtml = "", withHtml = "";
        const allReqs = snap.val() || {};
        const verifiedData = [];
        
        db.ref('verified_tids').once('value', vSnap => {
            vSnap.forEach(v => verifiedData.push(v.val().tid));

            snap.forEach(child => {
                const r = child.val();
                if(r.status === 'pending') {
                    if(r.type === 'deposit') {
                        let isUsed = Object.values(allReqs).some(old => old.status === 'approved' && old.tid === r.tid);
                        let isMatch = !isUsed && verifiedData.some(msg => msg.includes(r.tid));
                        
                        if(isMatch) approveReq(child.key, r.uid, r.amount, 'deposit', true);

                        depHtml += `<tr>
                            <td>${r.email}</td><td>Rs ${r.amount}</td><td>${r.tid}</td>
                            <td>${isUsed ? '<b style="color:red">USED ❌</b>' : (isMatch ? '<b style="color:green">MATCHED ✅</b>' : 'Checking...')}</td>
                            <td><button class="btn btn-app" onclick="approveReq('${child.key}','${r.uid}',${r.amount},'deposit')">APP</button>
                            <button class="btn btn-rej" onclick="rejectReq('${child.key}')">REJ</button></td></tr>`;
                    } else {
                        withHtml += `<tr><td>${r.email}</td><td>Rs ${r.amount}</td><td>${r.method || 'N/A'}</td>
                            <td><button class="btn btn-app" onclick="approveReq('${child.key}','${r.uid}',${r.amount},'withdraw')">APP</button>
                            <button class="btn btn-rej" onclick="rejectReq('${child.key}')">REJ</button></td></tr>`;
                    }
                }
            });
            document.getElementById('depList').innerHTML = depHtml;
            document.getElementById('withList').innerHTML = withHtml;
        });
    });

    // 3. User Management (Edit Balance)
    db.ref('users').on('value', snap => {
        let html = "";
        snap.forEach(child => {
            const u = child.val();
            html += `<tr><td>${u.email}</td>
                <td><input type="number" id="bal-${child.key}" value="${u.balance || 0}"></td>
                <td><button class="btn btn-edit" onclick="updateBal('${child.key}')">SAVE</button></td></tr>`;
        });
        document.getElementById('userList').innerHTML = html;
    });
}

function approveReq(key, uid, amt, type, auto = false) {
    if(type === 'deposit') db.ref('users/'+uid+'/balance').transaction(c => (c || 0) + amt);
    db.ref('requests/'+key).update({status: 'approved'});
    if(!auto) alert("Approved!");
}

function rejectReq(key) {
    let reason = prompt("Enter Rejection Reason:");
    if(reason) {
        db.ref('requests/'+key).update({status: 'rejected', reason: reason});
        alert("Rejected with reason sent to user.");
    }
}

function updateBal(uid) {
    let newBal = document.getElementById('bal-'+uid).value;
    db.ref('users/'+uid).update({balance: parseFloat(newBal)});
    alert("Balance Updated!");
}
</script>
</body>
</html>
