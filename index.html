<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Master Admin - Aviator Project</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <style>
        :root { --red: #ea0606; --bg: #0f1015; --card: #1b1c21; --win: #28a745; --blue: #34b4ff; --gold: #f2a900; }
        body { background: var(--bg); color: #fff; font-family: sans-serif; margin: 0; padding: 20px; }
        .live-box { background: #000; color: #00ff00; padding: 15px; border-radius: 8px; border: 1px solid #00ff00; font-family: monospace; margin-bottom: 20px; min-height: 40px; word-break: break-all; }
        .match-btn { background: #ffcc00; color: #000; font-weight: bold; border-radius: 4px; padding: 4px 8px; font-size: 10px; }
        #login-box { max-width: 400px; margin: 100px auto; background: var(--card); padding: 30px; border-radius: 12px; text-align: center; border: 1px solid var(--gold); }
        .login-input { width: 90%; padding: 10px; margin: 10px 0; background: #000; border: 1px solid #444; color: #fff; border-radius: 5px; }
        .login-btn { background: var(--gold); color: #000; padding: 10px 20px; border: none; border-radius: 5px; font-weight: bold; cursor: pointer; width: 100%; }
        .header { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid var(--win); padding-bottom: 10px; margin-bottom: 20px; }
        .section { background: var(--card); padding: 20px; border-radius: 12px; margin-bottom: 25px; border: 1px solid #333; }
        h2 { color: var(--gold); font-size: 16px; text-transform: uppercase; margin-top: 0; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 12px; }
        th { text-align: left; color: #888; padding: 10px; border-bottom: 1px solid #333; }
        td { padding: 10px; border-bottom: 1px solid #222; }
        .btn { padding: 8px 12px; border: none; border-radius: 5px; color: white; cursor: pointer; font-weight: bold; font-size: 10px; }
        .btn-app { background: var(--win); } .btn-rej { background: var(--red); }
        input { background: #000; border: 1px solid #444; color: #fff; padding: 5px; width: 60px; }
    </style>
</head>
<body>

<div id="login-box">
    <h2 style="color:var(--gold)">PAK AVIATOR VIP</h2>
    <input type="password" id="adminPass" class="login-input" placeholder="VIP Password">
    <button class="login-btn" onclick="loginAdmin()">LOGIN</button>
</div>

<div id="admin-dashboard" style="display: none;">
    <div class="header">
        <h1>MASTER ADMIN</h1>
        <div id="stats">Users: Loading...</div>
    </div>

    <div class="section">
        <h2>Live JazzCash SMS (Real-Time)</h2>
        <div id="latest-sms" class="live-box">Waiting for SMS...</div>
    </div>

    <div class="section">
        <h2>Deposit Requests</h2>
        <table>
            <thead>
                <tr>
                    <th>Email</th>
                    <th>Amount</th>
                    <th>TID</th>
                    <th>Status</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody id="depList"></tbody>
        </table>
    </div>

    </div>

<script>
const conf = { databaseURL: "https://aviator-781d9-default-rtdb.firebaseio.com" };
firebase.initializeApp(conf);
const db = firebase.database();

let currentSMS = "";

function loginAdmin() {
    const pass = document.getElementById("adminPass").value;
    firebase.auth().signInWithEmailAndPassword("M50516573@gmail.com", pass)
    .then(() => {
        document.getElementById("login-box").style.display = "none";
        document.getElementById("admin-dashboard").style.display = "block";
        startApp();
    }).catch(e => alert("Error: " + e.message));
}

function startApp() {
    // SMS Listener (Fixed Undefined)
    db.ref('verified_tids').on('value', snap => {
        const val = snap.val();
        if(!val) currentSMS = "No SMS";
        else if(typeof val === 'string') currentSMS = val;
        else currentSMS = val.tid || JSON.stringify(val);
        
        document.getElementById('latest-sms').innerText = "LATEST: " + currentSMS;
        autoMatchTIDs();
    });

    // Deposit Listener
    db.ref('requests').orderByChild('type').equalTo('deposit').on('value', snap => {
        let html = "";
        snap.forEach(child => {
            const r = child.val();
            if(r.status === 'pending') {
                html += `<tr class="dep-row">
                    <td style="color:var(--blue)">${r.email}</td>
                    <td>Rs ${r.amount}</td>
                    <td class="tid-val" style="color:var(--gold)">${r.tid}</td>
                    <td class="match-cell" style="color:#666">Checking...</td>
                    <td>
                        <button class="btn btn-app" onclick="approveDep('${child.key}','${r.uid}',${r.amount})">APP</button>
                        <button class="btn btn-rej" onclick="rejectReq('${child.key}')">REJ</button>
                    </td>
                </tr>`;
            }
        });
        document.getElementById('depList').innerHTML = html || "<tr><td colspan='5'>No deposits</td></tr>";
        autoMatchTIDs();
    });
}

function autoMatchTIDs() {
    if(!currentSMS || currentSMS.includes("Waiting")) return;
    document.querySelectorAll('.dep-row').forEach(row => {
        const tid = row.querySelector('.tid-val').innerText.trim();
        const status = row.querySelector('.match-cell');
        if(tid && currentSMS.includes(tid)) {
            status.innerHTML = "<b style='color:#00ff00'>MATCHED ✅</b>";
            row.style.background = "rgba(40, 167, 69, 0.15)";
        }
    });
}

// Baki Approve/Reject/Withdraw functions purany waly hi use karein
function approveDep(k, u, a) {
    db.ref('users/'+u+'/balance').transaction(c => (c||0)+parseFloat(a));
    db.ref('requests/'+k).update({status:'approved'});
    alert("Approved!");
}
function rejectReq(k) { db.ref('requests/'+k).update({status:'rejected'}); }
</script>
</body>
</html>
