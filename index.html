<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Master Admin - Aviator B9 VIP</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    
    <style>
        :root { --red: #ea0606; --bg: #0f1015; --card: #1b1c21; --win: #28a745; --blue: #34b4ff; --gold: #f2a900; }
        body { background: var(--bg); color: #fff; font-family: sans-serif; margin: 0; padding: 20px; }
        
        /* Dashboard Container */
        .admin-box { max-width: 500px; margin: auto; }
        .section { background: var(--card); padding: 20px; border-radius: 12px; margin-bottom: 20px; border: 1px solid #333; }
        
        /* Engine UI */
        .engine-display { background: #000; padding: 20px; border-radius: 15px; text-align: center; border: 2px solid var(--gold); margin-bottom: 20px; }
        #liveMult { font-size: 50px; font-weight: 900; color: var(--gold); margin: 10px 0; display: block; }
        .status-txt { color: #888; font-size: 14px; text-transform: uppercase; letter-spacing: 1px; }

        /* Controls */
        .control-group { margin: 15px 0; }
        label { display: block; margin-bottom: 5px; color: var(--blue); font-size: 12px; font-weight: bold; }
        input { width: 100%; padding: 12px; background: #000; border: 1px solid #444; color: #fff; border-radius: 8px; box-sizing: border-box; font-size: 18px; text-align: center; }
        
        .btn { width: 100%; padding: 15px; border: none; border-radius: 10px; font-weight: bold; font-size: 16px; cursor: pointer; margin-top: 10px; }
        .btn-start { background: var(--win); color: white; }
        .btn-stop { background: var(--red); color: white; }
        
        /* Request List */
        .req-card { background: #111; padding: 10px; border-radius: 8px; margin-top: 10px; border-left: 4px solid var(--win); font-size: 12px; display: flex; justify-content: space-between; align-items: center; }
        .btn-sm { padding: 5px 10px; font-size: 10px; }
    </style>
</head>
<body>

<div class="admin-box">
    <div style="text-align: center; margin-bottom: 20px;">
        <h2 style="color:var(--gold); margin:0;">B9 MASTER CONTROL</h2>
        <small>Muhammad Shop - Aviator Project</small>
    </div>

    <div class="section">
        <div class="engine-display">
            <span class="status-txt" id="engineStatus">ENGINE READY</span>
            <span id="liveMult">1.00x</span>
            <span id="timerTxt" style="color:var(--blue); font-weight:bold;"></span>
        </div>

        <div class="control-group">
            <label>TARGET CRASH (HOUSE EDGE SYSTEM)</label>
            <input type="number" id="targetX" value="2.50" step="0.01">
            <small style="color:#666;">Yahan jo number likhenge game wahin rukegi.</small>
        </div>

        <button id="mainBtn" class="btn btn-start" onclick="toggleEngine()">START AUTO LOOP</button>
    </div>

    <div class="section">
        <h3 style="font-size:14px; color:var(--win); margin-top:0;">PENDING DEPOSITS</h3>
        <div id="depList">Loading...</div>
    </div>

    <div class="section">
        <h3 style="font-size:14px; color:var(--blue); margin-top:0;">USER BALANCES</h3>
        <div id="userList" style="max-height: 200px; overflow-y: auto;"></div>
    </div>
</div>

<script>
const conf = { apiKey: "AIzaSyBXZaME3Z0rd_jsa5LpVG5ZbLpvf6cbu8M", databaseURL: "https://aviator-781d9-default-rtdb.firebaseio.com" };
firebase.initializeApp(conf);
const db = firebase.database();

let isRunning = false;

// 1. ENGINE CONTROL (HOUSE EDGE SYSTEM)
async function toggleEngine() {
    if(isRunning) {
        location.reload(); // Stop engine
        return;
    }
    
    isRunning = true;
    document.getElementById('mainBtn').innerText = "STOP ENGINE (EMERGENCY)";
    document.getElementById('mainBtn').className = "btn btn-stop";

    while(isRunning) {
        // PHASE 1: WAITING (7 Seconds)
        for(let i=7; i>=0; i--) {
            await db.ref('game_state').update({ isFlying: false, isWaiting: true, timer: i, mult: 1.0 });
            document.getElementById('engineStatus').innerText = "WAITING FOR PLAYERS";
            document.getElementById('timerTxt').innerText = i + "s";
            await sleep(1000);
        }

        // PHASE 2: FLYING
        let target = parseFloat(document.getElementById('targetX').value) || 2.0;
        let currentM = 1.0;
        document.getElementById('timerTxt').innerText = "";
        document.getElementById('engineStatus').innerText = "PLANE IS FLYING";
        await db.ref('game_state').update({ isFlying: true, isWaiting: false });

        while(currentM < target) {
            currentM += 0.01;
            await db.ref('game_state').update({ mult: currentM });
            document.getElementById('liveMult').innerText = currentM.toFixed(2) + "x";
            
            // Speed logic: Thora slow rakha hai taake Firebase sync kare
            let speed = currentM < 2 ? 80 : 50; 
            await sleep(speed);
            if(!isRunning) break;
        }

        // PHASE 3: CRASH
        await db.ref('game_state').update({ isFlying: false, isWaiting: false });
        document.getElementById('engineStatus').innerText = "FLEW AWAY!";
        await sleep(3000); // 3 seconds pause after crash
    }
}

function sleep(ms) { return new Promise(res => setTimeout(res, ms)); }

// 2. DATA MANAGEMENT (Deposits & Users)
function loadAdminData() {
    // Deposits
    db.ref('requests').on('value', snap => {
        let html = "";
        snap.forEach(child => {
            const r = child.val();
            if(r.status === 'pending' && r.type === 'deposit') {
                html += `<div class="req-card">
                    <div><b>Rs ${r.amount}</b><br><small>${r.tid}</small></div>
                    <button class="btn-sm btn-start" onclick="approveDep('${child.key}', '${r.uid}', ${r.amount})">APPROVE</button>
                </div>`;
            }
        });
        document.getElementById('depList').innerHTML = html || "No pending deposits";
    });

    // User Balance Edit
    db.ref('users').on('value', snap => {
        let html = "";
        snap.forEach(child => {
            const u = child.val();
            html += `<div style="display:flex; justify-content:space-between; padding:5px; border-bottom:1px solid #222; font-size:11px;">
                <span>${u.email}</span>
                <span style="color:var(--win)">Rs ${u.balance.toFixed(2)}</span>
            </div>`;
        });
        document.getElementById('userList').innerHTML = html;
    });
}

function approveDep(key, uid, amt) {
    db.ref('users/' + uid + '/balance').transaction(b => (b || 0) + parseFloat(amt));
    db.ref('requests/' + key).update({ status: 'approved' });
}

loadAdminData();
</script>
</body>
</html>
