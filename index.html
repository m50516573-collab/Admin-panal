<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Master Admin - Aviator B9 VIP</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    
    <style>
        :root { --red: #ea0606; --bg: #0f1015; --card: #1b1c21; --win: #28a745; --blue: #34b4ff; --gold: #f2a900; }
        body { background: var(--bg); color: #fff; font-family: sans-serif; margin: 0; padding: 20px; }
        
        #login-box { max-width: 400px; margin: 100px auto; background: var(--card); padding: 30px; border-radius: 12px; text-align: center; border: 1px solid var(--gold); }
        .login-input { width: 90%; padding: 10px; margin: 10px 0; background: #000; border: 1px solid #444; color: #fff; border-radius: 5px; }
        .login-btn { background: var(--gold); color: #000; padding: 10px 20px; border: none; border-radius: 5px; font-weight: bold; cursor: pointer; width: 100%; }

        .header { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid var(--win); padding-bottom: 10px; margin-bottom: 20px; }
        .section { background: var(--card); padding: 20px; border-radius: 12px; margin-bottom: 25px; border: 1px solid #333; }
        
        /* Engine Control UI */
        .engine-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 20px; }
        .status-tile { background: #000; padding: 15px; border-radius: 10px; text-align: center; border: 1px solid #444; }
        .big-mult { font-size: 35px; font-weight: 900; color: var(--gold); display: block; }
        
        h2 { color: var(--gold); font-size: 16px; text-transform: uppercase; margin-top: 0; }
        table { width: 100%; border-collapse: collapse; font-size: 12px; }
        th { text-align: left; color: #888; padding: 10px; border-bottom: 1px solid #333; }
        td { padding: 10px; border-bottom: 1px solid #222; }
        
        .btn { padding: 8px 15px; border: none; border-radius: 5px; color: white; cursor: pointer; font-weight: bold; }
        .btn-start { background: var(--win); width: 100%; padding: 15px; font-size: 16px; }
        .btn-stop { background: var(--red); width: 100%; padding: 15px; font-size: 16px; }
        .btn-set { background: var(--blue); }
        input { background: #000; border: 1px solid #444; color: #fff; padding: 8px; border-radius: 5px; }
    </style>
</head>
<body>

<div id="login-box">
    <h2 style="color:var(--gold)">B9 VIP ENGINE</h2>
    <p>Master Admin Access</p>
    <input type="email" id="adminEmail" class="login-input" value="M50516573@gmail.com" readonly>
    <input type="password" id="adminPass" class="login-input" placeholder="VIP Password">
    <button class="login-btn" onclick="loginAdmin()">OPEN CONTROL PANEL</button>
</div>

<div id="admin-dashboard" style="display: none;">
    <div class="header">
        <div><h1>MASTER ADMIN</h1><small id="stats">Engine: Offline</small></div>
        <button onclick="location.reload()" style="background:none; color:#888; border:1px solid #444; border-radius:5px; padding:5px;">Logout</button>
    </div>

    <div class="section" style="border: 1px solid var(--gold);">
        <h2>✈️ B9 Game Engine Control</h2>
        <div class="engine-grid">
            <div class="status-tile">
                <span style="font-size:10px; color:#888;">LIVE MULTIPLIER</span>
                <span id="liveMult" class="big-mult">1.00x</span>
            </div>
            <div class="status-tile">
                <span style="font-size:10px; color:#888;">NEXT CRASH POINT</span><br>
                <input type="number" id="nextCrash" value="2.5" step="0.1" style="width:70%; font-size:20px; text-align:center; margin-top:5px;">
            </div>
        </div>
        <div id="loopControls">
            <button id="startBtn" class="btn btn-start" onclick="startAutoLoop()">START AUTO GAME LOOP</button>
        </div>
    </div>

    <div class="section">
        <h2>Deposit Requests (Check TID)</h2>
        <div style="overflow-x:auto;">
            <table>
                <thead><tr><th>Gmail</th><th>Amt</th><th>TID</th><th>Action</th></tr></thead>
                <tbody id="depList"></tbody>
            </table>
        </div>
    </div>

    <div class="section">
        <h2>Withdrawal Requests</h2>
        <div style="overflow-x:auto;">
            <table>
                <thead><tr><th>Gmail</th><th>Amt</th><th>Account</th><th>Action</th></tr></thead>
                <tbody id="witList"></tbody>
            </table>
        </div>
    </div>

    <div class="section">
        <h2>User Management</h2>
        <div style="overflow-x:auto; max-height: 300px;">
            <table>
                <thead><tr><th>Gmail</th><th>Bal</th><th>Set</th><th>Action</th></tr></thead>
                <tbody id="userList"></tbody>
            </table>
        </div>
    </div>
</div>

<script>
const conf = { apiKey: "AIzaSyBXZaME3Z0rd_jsa5LpVG5ZbLpvf6cbu8M", databaseURL: "https://aviator-781d9-default-rtdb.firebaseio.com" };
firebase.initializeApp(conf);
const db = firebase.database();

function loginAdmin() {
    const email = "M50516573@gmail.com";
    const pass = document.getElementById("adminPass").value;
    firebase.auth().signInWithEmailAndPassword(email, pass)
    .then(() => {
        document.getElementById("login-box").style.display = "none";
        document.getElementById("admin-dashboard").style.display = "block";
        loadData();
        listenToEngine();
    }).catch(e => alert("Error: " + e.message));
}

// --- GAME ENGINE LOGIC ---
let isLoopRunning = false;

function listenToEngine() {
    db.ref('game_state').on('value', snap => {
        const d = snap.val();
        if(d) {
            document.getElementById('liveMult').innerText = d.mult.toFixed(2) + "x";
            document.getElementById('stats').innerText = d.isFlying ? "Status: FLYING" : (d.isWaiting ? "Status: WAITING" : "Status: CRASHED");
        }
    });
}

async function startAutoLoop() {
    if(isLoopRunning) return;
    isLoopRunning = true;
    document.getElementById('loopControls').innerHTML = `<button class="btn btn-stop" onclick="location.reload()">STOP & EMERGENCY RESET</button>`;
    
    while(isLoopRunning) {
        // 1. Waiting (7s)
        for(let i=7; i>=0; i--) {
            await db.ref('game_state').update({ isFlying: false, isWaiting: true, timer: i, mult: 1.0 });
            await new Promise(r => setTimeout(r, 1000));
        }

        // 2. Flying
        let crashPoint = parseFloat(document.getElementById('nextCrash').value) || 2.0;
        let m = 1.0;
        await db.ref('game_state').update({ isFlying: true, isWaiting: false });
        
        while(m < crashPoint) {
            m += 0.01;
            await db.ref('game_state').update({ mult: m });
            // Plane speed control
            let speed = m < 2 ? 100 : (m < 5 ? 60 : 30); 
            await new Promise(r => setTimeout(r, speed));
        }

        // 3. Crash
        await db.ref('game_state').update({ isFlying: false, isWaiting: false });
        await new Promise(r => setTimeout(r, 3000)); // Wait 3s before next round
        
        // Randomize next crash point for variety
        document.getElementById('nextCrash').value = (Math.random() * (3.5 - 1.1) + 1.1).toFixed(2);
    }
}

// --- DATA MANAGEMENT ---
function loadData() {
    // Deposits
    db.ref('requests').on('value', snap => {
        let depHtml = "", witHtml = "";
        snap.forEach(child => {
            const r = child.val();
            if(r.status === 'pending') {
                if(r.type === 'deposit') {
                    depHtml += `<tr><td>${r.email}</td><td>${r.amount}</td><td>${r.tid}</td>
                        <td><button class="btn" style="background:green" onclick="approveDep('${child.key}','${r.uid}',${r.amount})">✔</button></td></tr>`;
                } else {
                    witHtml += `<tr><td>${r.email}</td><td>${r.amount}</td><td>${r.number}</td>
                        <td><button class="btn" style="background:var(--blue)" onclick="payWit('${child.key}')">PAID</button></td></tr>`;
                }
            }
        });
        document.getElementById('depList').innerHTML = depHtml;
        document.getElementById('witList').innerHTML = witHtml;
    });

    // Users
    db.ref('users').on('value', snap => {
        let html = "";
        snap.forEach(child => {
            const u = child.val();
            html += `<tr><td>${u.email}</td><td style="color:var(--win)">${u.balance.toFixed(2)}</td>
                <td><input type="number" id="nb_${child.key}" style="width:60px"></td>
                <td><button class="btn btn-set" onclick="setBal('${child.key}')">SET</button></td></tr>`;
        });
        document.getElementById('userList').innerHTML = html;
    });
}

function approveDep(key, uid, amt) {
    db.ref('users/' + uid + '/balance').transaction(b => (b || 0) + parseFloat(amt));
    db.ref('requests/' + key).update({status: 'approved'});
}

function payWit(key) {
    db.ref('requests/' + key).update({status: 'paid'});
}

function setBal(uid) {
    const val = document.getElementById('nb_' + uid).value;
    if(val) db.ref('users/' + uid).update({balance: parseFloat(val)});
}
</script>
</body>
</html>
